name: Full CI Workflow

# 🔹 Run only when changes happen inside src folder
on:
  push:
    paths:
      - 'src/**'

jobs:

  # 🔹 Job 1: Build + Install dependencies
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: echo "Build successful"


  # 🔹 Job 2: Run tests (after build)
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run test script
        run: npm test


  # 🔹 Job 3: Deploy (after test)
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy
        run: echo "Deployment successful"